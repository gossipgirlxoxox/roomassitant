<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>AI Room Assistant</title>
    <script src="script.js"></script>
    <link rel="stylesheet" href="style.css">
</head>


<body>

<div class="app">


    <!-- YOUR ROOM -->
    <section class="room">

        <h1>🌐 My Room</h1>

        <div id="users">
            <!-- People detected in room appear here -->
        </div>


        <div id="roomChat">

            <div class="message">
                System: Room started.
            </div>

        </div>


    </section>



    <!-- AI ASSISTANT -->
    <section class="assistant">


        <div class="avatar">

            <!-- Future animated avatar -->
            <div id="aiFace">
                🤖
            </div>

        </div>



        <h2>
            ✨ Aster - Room Assistant
        </h2>


        <div id="aiStatus">
            Online
        </div>



        <!-- AI messages -->
        <div id="aiChat">


            <div class="ai-message">

                Hello! I'm watching your room.
                I'll tell you when someone joins.

            </div>


        </div>



        <!-- Owner controls -->
        <div class="controls">


            <input 
            id="ownerInput"
            placeholder="Talk to Aster..."
            >


            <button id="sendButton">
                Send
            </button>


            <button id="voiceButton">
                🔊
            </button>


        </div>



    </section>



</div>



<script src="script.js"></script>

</body>

</html>
